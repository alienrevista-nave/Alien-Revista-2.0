<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site.title | default: "ALIEN REVISTA" }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="header">
    <!-- Logo -->
    <a href="/" class="logo-link">
      <img src="{{ '/assets/alien-icon.png' | relative_url }}" alt="Alien" class="alien-icon">
      <img src="{{ '/assets/alien-text.png' | relative_url }}" alt="ALIEN" class="alien-text">
    </a>

    <!-- Tagline en header -->
    <div class="tagline">EN CONTACTO CON LA ATMÓSFERA</div>

    <!-- Menú hamburguesa (ovni en móvil) -->
    <input type="checkbox" id="menu-toggle" class="menu-toggle">
    <label for="menu-toggle" class="hamburger">🛸</label>

    <!-- Navegación -->
    <nav class="nav">
      <a href="#" class="nav-btn">Ficción</a>
      <a href="#" class="nav-btn">No Ficción</a>
      <a href="#" class="nav-btn">Reseñas</a>
      <a href="/frecuencias/" class="nav-btn">Frecuencias</a>
    </nav>
  </header>

  {{ content }}
</body>
</html>
